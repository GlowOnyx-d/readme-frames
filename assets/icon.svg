<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- background -->
  <rect width="128" height="128" rx="24" fill="#0d1117"/>

  <!-- film notches top -->
  <rect x="16" y="10" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="38" y="10" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="60" y="10" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="82" y="10" width="14" height="10" rx="3" fill="#30363d"/>

  <!-- film notches bottom -->
  <rect x="16" y="108" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="38" y="108" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="60" y="108" width="14" height="10" rx="3" fill="#30363d"/>
  <rect x="82" y="108" width="14" height="10" rx="3" fill="#30363d"/>

  <!-- terminal prompt  > -->
  <text
    x="18"
    y="76"
    font-family="ui-monospace, monospace"
    font-size="44"
    font-weight="700"
    fill="#7ee787"
  >&gt;</text>

  <!-- blinking cursor block -->
  <rect x="68" y="44" width="26" height="34" rx="3" fill="#7ee787" opacity="0.9"/>
</svg>
