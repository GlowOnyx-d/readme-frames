name: Render README animations

on:
  workflow_dispatch:
  push:
    paths:
      - 'compositions/**'
      - 'config.js'
      - '.github/workflows/render-readme.yml'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: npm install -g hyperframes

      # config.js must sit next to each index.html so Chrome can load it
      - run: cp config.js compositions/skills-ticker/config.js && cp config.js compositions/terminal/config.js

      # render to MP4 first (hyperframes doesn't support gif directly)
      # must cd into each project dir so hyperframes finds index.html in CWD
      - run: cd compositions/skills-ticker && hyperframes render --fps 30 --output ../../assets/skills-ticker.mp4

      - run: cd compositions/terminal && hyperframes render --fps 30 --output ../../assets/terminal.mp4

      # convert MP4 → optimised GIF with ffmpeg
      - run: >
          ffmpeg -i assets/skills-ticker.mp4
          -vf "fps=15,scale=960:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/skills-ticker.gif

      - run: >
          ffmpeg -i assets/terminal.mp4
          -vf "fps=20,scale=800:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse"
          -loop 0 assets/terminal.gif

      # clean up intermediary MP4s
      - run: rm assets/skills-ticker.mp4 assets/terminal.mp4

      - name: Commit rendered GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: re-render README animations"
          git push
