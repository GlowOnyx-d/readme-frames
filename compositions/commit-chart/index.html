<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      overflow: hidden;
    }

    #stage {
      width: 900px;
      height: 300px;
      padding: 32px 40px;
      font-family: ui-monospace, 'SF Mono', monospace;
      position: relative;
    }

    #title {
      color: #e6edf3;
      font-size: 18px;
      font-weight: 700;
    }

    #subtitle {
      color: #8b949e;
      font-size: 13px;
      margin-top: 4px;
    }

    #plot {
      position: absolute;
      left: 40px;
      right: 40px;
      top: 84px;
      bottom: 28px;
    }

    #plot svg { display: block; }
  </style>
</head>
<body>
  <div id="stage"
    data-composition-id="commit-chart"
    data-start="0"
    data-width="900"
    data-height="300">

    <div id="title">commit activity</div>
    <div id="subtitle"></div>
    <div id="plot"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="./config.js"></script>
  <!-- data.js is generated at build time by scripts/fetch-commit-data.js and
       sets window.__COMMIT_DATA = { months: [...], values: [...] }. It's a build
       artifact (not committed); when absent — e.g. opening this file directly —
       the fallback below is used. -->
  <script src="./data.js"></script>
  <script>
    // Built synchronously so HyperFrames can read the timeline duration on its
    // init pass. The live GitHub data is fetched at build time (see data.js)
    // rather than in the browser — an in-browser `await fetch()` registers the
    // timeline too late and HyperFrames captures a permanent zero duration.
    const cfg    = CONFIG.commitChart || {};
    const months = cfg.months || 12;
    const color  = cfg.color || cfg.barColor || '#7ee787';
    const user   = cfg.username || CONFIG.username || 'bulkinglb';

    // ── data ────────────────────────────────────────────────────────────────
    // data.js sets window.__COMMIT_DATA = { months: ['Jul',…], values: [12,…] }.
    // Fall back to a plausible deterministic shape when it's missing/null.
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fallback() {
      const now = new Date();
      const labels = [];
      const values = [];
      for (let i = months - 1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        labels.push(monthNames[d.getMonth()]);
        // gentle wave so the demo never looks flat or broken
        values.push(Math.round(18 + 14 * Math.sin((months - i) / 1.7) + (months - i) * 1.3));
      }
      return { months: labels, values };
    }

    const live = (typeof window.__COMMIT_DATA !== 'undefined' && window.__COMMIT_DATA) || null;
    const data = (live && Array.isArray(live.values) && live.values.length) ? live : fallback();

    const labels = data.months;
    const values = data.values;
    const total  = values.reduce((a, b) => a + b, 0);

    document.getElementById('subtitle').textContent =
      `${total.toLocaleString()} commits · last ${values.length} months · @${user}`;

    // ── geometry ──────────────────────────────────────────────────────────────
    const W = 820, H = 188;
    const mL = 10, mR = 10, mT = 12, mB = 24;
    const plotW = W - mL - mR;
    const plotH = H - mT - mB;
    const baseline = mT + plotH;
    const max = Math.max(...values, 1);
    const n = values.length;

    const pts = values.map((v, i) => ({
      x: mL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW),
      y: mT + (1 - v / max) * plotH,
    }));

    // Catmull-Rom → cubic Bézier for a smooth curve through every point
    function smooth(p) {
      if (p.length < 2) return `M ${p[0].x} ${p[0].y}`;
      let d = `M ${p[0].x} ${p[0].y}`;
      for (let i = 0; i < p.length - 1; i++) {
        const p0 = p[i - 1] || p[i];
        const p1 = p[i];
        const p2 = p[i + 1];
        const p3 = p[i + 2] || p2;
        const c1x = p1.x + (p2.x - p0.x) / 6;
        const c1y = p1.y + (p2.y - p0.y) / 6;
        const c2x = p2.x - (p3.x - p1.x) / 6;
        const c2y = p2.y - (p3.y - p1.y) / 6;
        d += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
      }
      return d;
    }

    const lineD = smooth(pts);
    const areaD = `${lineD} L ${pts[n - 1].x} ${baseline} L ${pts[0].x} ${baseline} Z`;

    const labelEls = labels.map((lab, i) =>
      `<text x="${pts[i].x.toFixed(1)}" y="${H - 7}" fill="#484f58" font-size="11"
        font-family="ui-monospace, monospace" text-anchor="middle">${lab}</text>`
    ).join('');

    const dotEls = pts.map((p) =>
      `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5"
        fill="${color}" stroke="#0d1117" stroke-width="2" />`
    ).join('');

    document.getElementById('plot').innerHTML = `
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${color}" stop-opacity="0.35" />
            <stop offset="100%" stop-color="${color}" stop-opacity="0" />
          </linearGradient>
          <clipPath id="reveal"><rect id="reveal-rect" x="0" y="0" width="0" height="${H}" /></clipPath>
        </defs>

        <line x1="${mL}" y1="${baseline}" x2="${W - mR}" y2="${baseline}" stroke="#30363d" stroke-width="1" />
        ${labelEls}

        <g clip-path="url(#reveal)">
          <path d="${areaD}" fill="url(#fill)" />
          <path d="${lineD}" fill="none" stroke="${color}" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" />
          ${dotEls}
        </g>
      </svg>`;

    // ── animation ─────────────────────────────────────────────────────────────
    const revealRect = document.getElementById('reveal-rect');

    const tl = gsap.timeline({ paused: true });
    tl.fromTo(revealRect,
      { attr: { width: 0 } },
      { attr: { width: W }, duration: 2.0, ease: 'power2.out' },
      0.2);
    tl.set({}, {}, 2.6); // hold the finished chart for a beat

    window.__timelines = window.__timelines || {};
    window.__timelines['commit-chart'] = tl;
  </script>
</body>
</html>
