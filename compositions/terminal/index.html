<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #stage {
      width: 800px;
      height: 320px;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .titlebar {
      background: #3a3a3a;
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red   { background: #ff5f57; }
    .dot-amber { background: #ffbd2e; }
    .dot-green { background: #28c941; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      color: #8b949e;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 12px;
      margin-right: 36px;
    }

    .body {
      flex: 1;
      background: #0d1117;
      padding: 16px;
      font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    .line { display: flex; }

    .prompt { color: #7ee787; margin-right: 8px; flex-shrink: 0; }

    .text-cmd     { color: #e6edf3; }
    .text-out     { color: #e6edf3; }
    .text-success { color: #7ee787; }
    .text-error   { color: #f78166; }
    .text-info    { color: #79c0ff; }
  </style>
</head>
<body>
  <div id="stage"
    data-composition-id="terminal"
    data-start="0"
    data-width="800"
    data-height="320">

    <div class="titlebar">
      <span class="dot dot-red"></span>
      <span class="dot dot-amber"></span>
      <span class="dot dot-green"></span>
      <span class="titlebar-label" id="title-label">bash</span>
    </div>

    <div class="body" id="output"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="./config.js"></script>
  <script>
    document.getElementById('title-label').textContent =
      `${CONFIG.username}@${CONFIG.hostname}`;

    const PROMPT = `${CONFIG.username}@${CONFIG.hostname} ~ $ `;
    const SPEED  = CONFIG.typingSpeed   / 1000; // seconds per char
    const PAUSE  = CONFIG.pauseAfterLine / 1000; // seconds

    const output = document.getElementById('output');

    function makePromptRow() {
      const row  = document.createElement('div');
      row.className = 'line';
      const p = document.createElement('span');
      p.className = 'prompt';
      p.textContent = PROMPT;
      row.appendChild(p);
      const span = document.createElement('span');
      span.className = 'text-cmd';
      row.appendChild(span);
      return { row, span };
    }

    function makeOutputRow(type) {
      const row  = document.createElement('div');
      row.className = 'line';
      const span = document.createElement('span');
      span.className = `text-${type}`;
      row.appendChild(span);
      return { row, span };
    }

    // build timeline — each line uses a tween with onUpdate that SETS text
    // (never appends), so re-seeking to any frame always gives correct state
    const tl = gsap.timeline({ paused: true });
    let t = 0;

    for (let i = 0; i < CONFIG.lines.length; i++) {
      const { type, text } = CONFIG.lines[i];

      if (type === 'cmd') {
        const { row, span } = makePromptRow();
        tl.call(() => { output.appendChild(row); }, [], t);
        t += PAUSE;

        const proxy = { n: 0 };
        const fullText = text;
        const s = span;
        tl.to(proxy, {
          n: fullText.length,
          duration: fullText.length * SPEED,
          ease: 'none',
          onUpdate() { s.textContent = fullText.slice(0, Math.round(proxy.n)); },
        }, t);
        t += fullText.length * SPEED + PAUSE;

      } else {
        const { row, span } = makeOutputRow(type);
        tl.call(() => { output.appendChild(row); }, [], t);

        const proxy = { n: 0 };
        const fullText = text;
        const s = span;
        tl.to(proxy, {
          n: fullText.length,
          duration: fullText.length * SPEED * 0.4,
          ease: 'none',
          onUpdate() { s.textContent = fullText.slice(0, Math.round(proxy.n)); },
        }, t);
        t += fullText.length * SPEED * 0.4 + PAUSE;
      }
    }

    // final empty prompt
    const { row: finalRow } = makePromptRow();
    tl.call(() => { output.appendChild(finalRow); }, [], t);
    tl.set({}, {}, t + 1);

    window.__timelines = window.__timelines || {};
    window.__timelines['terminal'] = tl;
  </script>
</body>
</html>
