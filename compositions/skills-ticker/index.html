<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      overflow: hidden;
    }

    #stage {
      width: 1920px;
      height: 120px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #track {
      display: flex;
      align-items: center;
      gap: 48px;
      padding: 0 24px;
      white-space: nowrap;
      will-change: transform;
    }

    .icon-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .icon-wrap img {
      width: 72px;
      height: 72px;
      filter: invert(1);
      opacity: 0.85;
    }

    .icon-wrap span {
      color: #e6edf3;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="stage"
    data-composition-id="skills-ticker"
    data-start="0"
    data-width="1920"
    data-height="120">
    <div id="track"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="./config.js"></script>
  <script>
    const CDN   = 'https://cdn.jsdelivr.net/npm/simple-icons@latest/icons';
    const track = document.getElementById('track');

    // doubled list for seamless loop: at -50% the visual position resets
    ;[...CONFIG.icons, ...CONFIG.icons].forEach(({ slug, label }) => {
      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      wrap.innerHTML = `
        <img src="${CDN}/${slug}.svg" alt="${label}" loading="eager" />
        <span>${label}</span>
      `;
      track.appendChild(wrap);
    });

    // paused GSAP timeline — HyperFrames seeks it deterministically per frame
    const tl = gsap.timeline({ paused: true });
    tl.fromTo(track,
      { x: '0%' },
      { x: '-50%', duration: CONFIG.scrollDuration, ease: 'none' }
    );

    window.__timelines = window.__timelines || {};
    window.__timelines['skills-ticker'] = tl;
  </script>
</body>
</html>
